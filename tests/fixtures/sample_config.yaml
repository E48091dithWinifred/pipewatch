check_interval_seconds: 60
log_level: DEBUG

pipelines:
  - name: orders_etl
    source: postgres://localhost/warehouse
    enabled: true
    tags:
      - finance
      - critical
    thresholds:
      max_duration_seconds: 120.0
      max_error_rate: 0.01
      min_rows_processed: 100
      max_lag_seconds: 30.0

  - name: user_sync
    source: mysql://localhost/users
    enabled: true
    tags:
      - users
    thresholds:
      max_duration_seconds: 60.0
      max_error_rate: 0.05
      min_rows_processed: 0
      max_lag_seconds: 60.0

  - name: legacy_import
    source: csv:///data/legacy
    enabled: false
    tags: []
